name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute base href
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "href=/" >> "$GITHUB_OUTPUT"
          else
            echo "href=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish batch_processing.csproj -c Release -o "${{ github.workspace }}/publish-out"

      - name: Patch published base href
        run: |
          INDEX="${{ github.workspace }}/publish-out/wwwroot/index.html"
          sed -i "s|<base href=\"/\" />|<base href=\"${{ steps.base.outputs.href }}\" />|" "$INDEX"

      - name: GitHub Pages helpers
        run: |
          touch "${{ github.workspace }}/publish-out/wwwroot/.nojekyll"
          cp "${{ github.workspace }}/publish-out/wwwroot/index.html" "${{ github.workspace }}/publish-out/wwwroot/404.html"

      - name: Verify static site output
        run: |
          ROOT="${{ github.workspace }}/publish-out/wwwroot"
          test -f "$ROOT/index.html" || { echo "::error::Missing $ROOT/index.html"; exit 1; }
          test -d "$ROOT/_framework" || { echo "::error::Missing Blazor _framework folder"; exit 1; }
          echo "Site root has $(find "$ROOT" -type f | wc -l) files."

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/publish-out/wwwroot
          force_orphan: true
          enable_jekyll: false

      - name: Pages configuration hint
        if: success()
        run: |
          {
            echo "## GitHub Pages"
            echo "If the site shows **README.md** instead of the Blazor app, Pages is almost certainly serving the **wrong branch**."
            echo ""
            echo "Use **Settings → Pages → Build and deployment**: **Deploy from a branch**, branch **gh-pages**, folder **/** (root) — not **main** at repo root (Jekyll can turn README into the homepage there)."
          } >> "$GITHUB_STEP_SUMMARY"
